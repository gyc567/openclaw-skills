<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tech Shrimp Character</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 2048px;
            height: 2048px;
            background-color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1f25 0%, #111111 70%);
        }

        .container {
            width: 2048px;
            height: 2048px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tech Background Grid */
        .tech-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100px 100px;
            opacity: 0.5;
            z-index: 1;
        }

        /* Glowing Accent Circles */
        .glow-circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 242, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: 2;
        }

        .glow-1 {
            width: 1200px;
            height: 1200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .glow-2 {
            width: 600px;
            height: 600px;
            top: 30%;
            left: 20%;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.1) 0%, rgba(0, 0, 0, 0) 60%);
        }

        /* Circuit Lines SVG overlay */
        .circuit-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Main Character Container */
        .character-wrapper {
            position: relative;
            z-index: 10;
            width: 1600px;
            height: 1600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Image Styling */
        .character-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 50px rgba(0, 255, 242, 0.3));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        /* Futuristic HUD Elements */
        .hud-circle {
            position: absolute;
            border: 2px solid rgba(0, 255, 242, 0.2);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
        
        .hud-c1 { width: 1400px; height: 1400px; border-style: dashed; animation: rotate-cw 60s linear infinite; }
        .hud-c2 { width: 1300px; height: 1300px; border: 1px solid rgba(0, 255, 242, 0.1); }
        
        @keyframes rotate-cw {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- Tech Background Grid -->
        <div class="tech-grid"></div>

        <!-- Glowing Accents -->
        <div class="glow-circle glow-1"></div>
        <div class="glow-circle glow-2"></div>

        <!-- Decorative Circuit Lines -->
        <svg class="circuit-lines" viewBox="0 0 2048 2048" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M100 100 L300 100 L350 150" stroke="rgba(0, 255, 242, 0.3)" stroke-width="2" />
            <circle cx="100" cy="100" r="4" fill="rgba(0, 255, 242, 0.5)" />
            
            <path d="M1948 1948 L1748 1948 L1698 1898" stroke="rgba(0, 255, 242, 0.3)" stroke-width="2" />
            <circle cx="1948" cy="1948" r="4" fill="rgba(0, 255, 242, 0.5)" />

            <path d="M1948 100 L1800 100 L1750 150 L1750 300" stroke="rgba(0, 255, 242, 0.2)" stroke-width="2" />
            <path d="M100 1948 L250 1948 L300 1898 L300 1750" stroke="rgba(0, 255, 242, 0.2)" stroke-width="2" />
        </svg>

        <!-- HUD Circles -->
        <div class="hud-circle hud-c1"></div>
        <div class="hud-circle hud-c2"></div>

        <!-- Main Character -->
        <div class="character-wrapper">
            <img src="https://a.lovart.ai/artifacts/agent/jEyT9542ZHKxEvnT.jpeg" alt="Tech Shrimp Character" class="character-img">
        </div>
    </div>

</body>
</html>
